# Configuração Nixpacks Otimizada para Railway
[variables]
NODE_ENV = "production"
PORT = "8080"

[phases.install]
cmds = [
    "cd backend/api-gateway",
    "npm ci --omit=dev"
]

[phases.build]
cmds = [
    "echo 'Build phase - no build required'"
]

[start]
cmd = "cd backend/api-gateway && npm start"
