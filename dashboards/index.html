<!DOCTYPE html>
<html lang="pt-BR">
<head>

      font-family: 'Segoe UI', Arial, sans-serif;
      background: #181c24;
      color: #f3f3f3;
      margin: 0;

    }
    .container {
      max-width: 540px;
      margin: 60px auto;
      background: #232834;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 0 24px #0004;
      text-align: center;

    h1 {

      margin-bottom: 10px;
    }
    .logo {
      margin-bottom: 20px;
    }
    .powered {
      color: #18e0b2;
      font-size: 13px;
      margin-top: 40px;
      opacity: 0.7;
    }
    a {
      color: #18e0b2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://i.ibb.co/hyBNFLQ/logo-coinbitclub-bot.png" width="96" alt="CoinbitClub Logo" style="border-radius:12px;">
    </div>
    <h1>CoinbitClub Market Bot</h1>
    <p>Dashboard restrito.<br>Faça login para visualizar dados e métricas do robô.</p>
    <div class="powered">

</html>
