<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinBitClub - Dashboard Referencial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 🔝 Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .title-section h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .cycle-badge {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            margin-left: 20px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-tab.active {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 📊 Métricas Principais */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #FF9800, #E91E63);
        }

        .metric-icon {
            font-size: 36px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .metric-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4CAF50;
        }

        .metric-label {
            font-size: 14px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 🔄 Processo de Operação */
        .process-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            opacity: 0.8;
        }

        .process-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .process-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: all 0.3s ease;
        }

        .process-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .process-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .process-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(45deg, #2196F3, #1976D2);
        }

        .process-icon.active {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            animation: pulse 2s infinite;
        }

        .process-icon.waiting {
            background: linear-gradient(45deg, #FF9800, #F57C00);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        .process-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .process-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: auto;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .status-waiting {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
            border: 1px solid #FF9800;
        }

        .process-description {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .process-details {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        /* 📈 Performance Indicators */
        .performance-section {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .performance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .performance-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .performance-value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 5px;
        }

        .performance-label {
            font-size: 14px;
            opacity: 0.7;
        }

        /* 🔄 Loading Animation */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: loading 1.5s infinite ease-in-out;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.3s; }
        .loading-dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes loading {
            0%, 20%, 80%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* 📱 Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .title-section h1 {
                font-size: 24px;
            }

            .cycle-badge {
                margin-left: 0;
            }

            .nav-tabs {
                justify-content: center;
                flex-wrap: wrap;
            }

            .process-grid {
                grid-template-columns: 1fr;
            }

            .metrics-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }

        /* 🔔 Notificações */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* 🎯 Perfil Specific Styles */
        .profile-admin .metric-card::before {
            background: linear-gradient(90deg, #E91E63, #9C27B0, #673AB7, #3F51B5);
        }

        .profile-affiliate .metric-card::before {
            background: linear-gradient(90deg, #FF9800, #FF5722, #795548, #607D8B);
        }

        .profile-user .metric-card::before {
            background: linear-gradient(90deg, #4CAF50, #8BC34A, #CDDC39, #FFEB3B);
        }

        /* 🔥 Real-time Updates */
        .real-time-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid #4CAF50;
            color: #4CAF50;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse-indicator 2s infinite;
        }

        @keyframes pulse-indicator {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 🔝 Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🚀</div>
                <div class="title-section">
                    <h1 id="main-title">Operação do Robô em Tempo Real</h1>
                    <span class="cycle-badge" id="cycle-badge">Ciclo Atual #1</span>
                </div>
            </div>
            
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchProfile('admin')">
                    👑 Administração
                </button>
                <button class="nav-tab" onclick="switchProfile('affiliate')">
                    🤝 Afiliado
                </button>
                <button class="nav-tab" onclick="switchProfile('user')">
                    👤 Usuário
                </button>
            </div>
        </div>

        <!-- 📊 Métricas Principais -->
        <div class="metrics-grid" id="metrics-container">
            <div class="loading">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <span style="margin-left: 10px;">Carregando métricas...</span>
            </div>
        </div>

        <!-- 🔄 Processo de Operação -->
        <div class="process-section">
            <h2 class="section-title">Acompanhe cada etapa do processo automatizado</h2>
            <div class="process-grid" id="process-container">
                <div class="loading">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <span style="margin-left: 10px;">Carregando processo...</span>
                </div>
            </div>
        </div>

        <!-- 📈 Indicadores de Performance -->
        <div class="performance-section" id="performance-section">
            <h2 class="section-title">📈 Indicadores de Performance</h2>
            <div class="performance-grid" id="performance-container">
                <div class="loading">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <span style="margin-left: 10px;">Carregando indicadores...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔔 Notificação -->
    <div class="notification" id="notification">
        Dashboard atualizado com sucesso!
    </div>

    <!-- 🔥 Indicador Tempo Real -->
    <div class="real-time-indicator">
        🔥 Última atualização: <span id="last-update">--:--:--</span>
    </div>

    <script>
        // 🌐 WebSocket Connection
        let ws = null;
        let currentProfile = 'admin';
        let currentUserId = 'demo-user-001';
        let reconnectInterval = null;

        // 🚀 Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            initializeWebSocket();
            loadDashboard('admin');
            startAutoUpdate();
        });

        // 🔌 WebSocket Setup
        function initializeWebSocket() {
            try {
                ws = new WebSocket('ws://localhost:3002');
                
                ws.onopen = function() {
                    console.log('✅ WebSocket conectado');
                    showNotification('Conectado ao sistema em tempo real!', 'success');
                    
                    // Inscrever no dashboard atual
                    ws.send(JSON.stringify({
                        type: 'subscribe_dashboard',
                        profile: currentProfile,
                        userId: currentUserId
                    }));
                };

                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                };

                ws.onclose = function() {
                    console.log('❌ WebSocket desconectado');
                    showNotification('Conexão perdida. Tentando reconectar...', 'error');
                    
                    // Tentar reconectar a cada 5 segundos
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(() => {
                            console.log('🔄 Tentando reconectar...');
                            initializeWebSocket();
                        }, 5000);
                    }
                };

                ws.onerror = function(error) {
                    console.error('❌ Erro WebSocket:', error);
                };

            } catch (error) {
                console.error('❌ Erro ao conectar WebSocket:', error);
                showNotification('Erro de conexão. Usando modo offline.', 'error');
            }
        }

        // 📨 Handle WebSocket Messages
        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'connection':
                    console.log('🔗 Conectado:', data.message);
                    break;
                    
                case 'dashboard_update':
                    if (data.profile === currentProfile) {
                        updateDashboardFromData(data.data);
                        updateLastUpdateTime();
                    }
                    break;
                    
                case 'system_alert':
                    showNotification(data.message, 'warning');
                    break;
                    
                case 'trade_signal':
                    showNotification(`🎯 Novo sinal: ${data.signal}`, 'info');
                    break;
            }
        }

        // 🔄 Trocar Perfil
        function switchProfile(profile) {
            currentProfile = profile;
            
            // Atualizar visual das tabs
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Atualizar classe do body para estilos específicos
            document.body.className = `profile-${profile}`;
            
            // Carregar dashboard do perfil
            loadDashboard(profile);
            
            // Atualizar inscrição WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'subscribe_dashboard',
                    profile: profile,
                    userId: currentUserId
                }));
            }

            showNotification(`Dashboard ${profile} carregado!`, 'success');
        }

        // 📊 Carregar Dashboard
        async function loadDashboard(profile) {
            try {
                let url = '';
                switch (profile) {
                    case 'admin':
                        url = '/api/dashboard/admin';
                        break;
                    case 'affiliate':
                        url = `/api/dashboard/affiliate/${currentUserId}`;
                        break;
                    case 'user':
                        url = `/api/dashboard/user/${currentUserId}`;
                        break;
                }

                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    updateDashboardFromData(result.data);
                    updateLastUpdateTime();
                } else {
                    throw new Error(result.error || 'Erro ao carregar dashboard');
                }

            } catch (error) {
                console.error('❌ Erro ao carregar dashboard:', error);
                showNotification(`Erro ao carregar dashboard: ${error.message}`, 'error');
                loadOfflineDashboard(profile);
            }
        }

        // 🔄 Atualizar Dashboard com Dados
        function updateDashboardFromData(data) {
            // Atualizar título e subtítulo
            document.getElementById('main-title').textContent = data.title;
            document.getElementById('cycle-badge').textContent = data.subtitle.split(' - ')[0];

            // Atualizar métricas
            updateMetrics(data);
            
            // Atualizar processo
            updateProcess(data.process_stages);
            
            // Atualizar indicadores de performance
            updatePerformanceIndicators(data);
        }

        // 📊 Atualizar Métricas
        function updateMetrics(data) {
            const container = document.getElementById('metrics-container');
            let metrics = [];

            switch (currentProfile) {
                case 'admin':
                    metrics = [
                        { icon: '👥', value: data.main_metrics.total_users, label: 'Usuários Ativos' },
                        { icon: '🎯', value: data.main_metrics.total_operations, label: 'Operações Total' },
                        { icon: '👨‍💼', value: data.main_metrics.total_managers, label: 'Gestores Ativos' },
                        { icon: '💰', value: `$${data.main_metrics.total_pnl}`, label: 'P&L Total' },
                        { icon: '📈', value: data.main_metrics.system_win_rate, label: 'Win Rate Sistema' }
                    ];
                    break;
                    
                case 'affiliate':
                    metrics = [
                        { icon: '👥', value: data.affiliate_metrics.referred_users, label: 'Usuários Referenciados' },
                        { icon: '✅', value: data.affiliate_metrics.active_users, label: 'Usuários Ativos' },
                        { icon: '💰', value: `$${data.affiliate_metrics.total_commission}`, label: 'Comissão Total' },
                        { icon: '📊', value: `${data.affiliate_metrics.commission_rate}%`, label: 'Taxa Comissão' },
                        { icon: '📈', value: `$${data.affiliate_metrics.monthly_earnings}`, label: 'Ganhos do Mês' }
                    ];
                    break;
                    
                case 'user':
                    metrics = [
                        { icon: '💎', value: `$${data.user_metrics.account_balance}`, label: 'Saldo da Conta' },
                        { icon: '🎯', value: data.user_metrics.total_operations, label: 'Operações Total' },
                        { icon: '📈', value: data.user_metrics.win_rate, label: 'Taxa de Acerto' },
                        { icon: '💰', value: `$${data.user_metrics.total_profit}`, label: 'Lucro Total' },
                        { icon: '🚀', value: `${data.user_metrics.monthly_roi}%`, label: 'ROI Mensal' }
                    ];
                    break;
            }

            container.innerHTML = metrics.map(metric => `
                <div class="metric-card">
                    <div class="metric-icon">${metric.icon}</div>
                    <div class="metric-value">${metric.value}</div>
                    <div class="metric-label">${metric.label}</div>
                </div>
            `).join('');
        }

        // 🔄 Atualizar Processo
        function updateProcess(stages) {
            const container = document.getElementById('process-container');
            
            container.innerHTML = stages.map(stage => {
                const statusClass = stage.status === 'ATIVO' ? 'active' : 'waiting';
                const statusText = stage.status === 'ATIVO' ? 'status-active' : 'status-waiting';
                
                return `
                    <div class="process-card">
                        <div class="process-header">
                            <div class="process-icon ${statusClass}">
                                ${stage.icon}
                            </div>
                            <div class="process-title">${stage.title}</div>
                            <div class="process-status ${statusText}">
                                ${stage.status}
                            </div>
                        </div>
                        <div class="process-description">
                            ${stage.description}
                        </div>
                        <div class="process-details">
                            ${Object.entries(stage.details).map(([key, value]) => `
                                <div class="detail-row">
                                    <span>${key.replace(/_/g, ' ').toUpperCase()}:</span>
                                    <span><strong>${value}</strong></span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 📈 Atualizar Indicadores de Performance
        function updatePerformanceIndicators(data) {
            const container = document.getElementById('performance-container');
            let indicators = [];

            if (data.performance_indicators) {
                switch (currentProfile) {
                    case 'admin':
                        indicators = [
                            { value: data.performance_indicators.system_health.overall_score, label: 'Saúde do Sistema' },
                            { value: data.performance_indicators.system_health.uptime, label: 'Uptime' },
                            { value: data.performance_indicators.system_health.response_time, label: 'Tempo Resposta' },
                            { value: data.performance_indicators.system_health.performance_grade, label: 'Nota Performance' }
                        ];
                        break;
                        
                    case 'affiliate':
                        indicators = [
                            { value: data.performance_indicators.user_satisfaction, label: 'Satisfação Usuários' },
                            { value: `$${data.performance_indicators.avg_user_profit}`, label: 'Lucro Médio Usuário' },
                            { value: data.performance_indicators.earning_trend, label: 'Tendência Ganhos' }
                        ];
                        break;
                        
                    case 'user':
                        indicators = [
                            { value: data.performance_indicators.personal_ranking, label: 'Ranking Pessoal' },
                            { value: data.performance_indicators.vs_market, label: 'vs Mercado' },
                            { value: data.performance_indicators.consistency_score, label: 'Consistência' },
                            { value: data.performance_indicators.growth_trend, label: 'Tendência Crescimento' }
                        ];
                        break;
                }
            }

            container.innerHTML = indicators.map(indicator => `
                <div class="performance-card">
                    <div class="performance-value">${indicator.value}</div>
                    <div class="performance-label">${indicator.label}</div>
                </div>
            `).join('');
        }

        // 📴 Dashboard Offline (Fallback)
        function loadOfflineDashboard(profile) {
            const mockData = {
                title: '🚀 Operação do Robô em Tempo Real',
                subtitle: 'Ciclo Atual #1 - Modo Offline',
                main_metrics: {
                    total_users: 1247,
                    total_operations: 5680,
                    total_managers: 12,
                    total_pnl: '45,230',
                    system_win_rate: '68%'
                },
                process_stages: [
                    {
                        id: 1,
                        title: 'ANÁLISE DE MERCADO',
                        icon: '📊',
                        status: 'ATIVO',
                        description: 'Sistema operando em modo offline',
                        details: { status: 'Offline', mode: 'Demo' }
                    }
                ],
                performance_indicators: {
                    system_health: {
                        overall_score: 'OFFLINE',
                        uptime: '0%',
                        response_time: '--',
                        performance_grade: '--'
                    }
                }
            };

            updateDashboardFromData(mockData);
        }

        // 🔔 Mostrar Notificação
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            
            // Aplicar cor baseada no tipo
            switch (type) {
                case 'success':
                    notification.style.background = 'linear-gradient(45deg, #4CAF50, #45a049)';
                    break;
                case 'error':
                    notification.style.background = 'linear-gradient(45deg, #f44336, #d32f2f)';
                    break;
                case 'warning':
                    notification.style.background = 'linear-gradient(45deg, #FF9800, #F57C00)';
                    break;
                default:
                    notification.style.background = 'linear-gradient(45deg, #2196F3, #1976D2)';
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ⏰ Atualizar Horário
        function updateLastUpdateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR');
            document.getElementById('last-update').textContent = timeString;
        }

        // 🔄 Auto Update
        function startAutoUpdate() {
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'request_update',
                        profile: currentProfile,
                        userId: currentUserId
                    }));
                } else {
                    loadDashboard(currentProfile);
                }
            }, 30000); // 30 segundos
        }

        // 🎯 Request Manual Update
        function requestUpdate() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'request_update',
                    profile: currentProfile,
                    userId: currentUserId
                }));
            } else {
                loadDashboard(currentProfile);
            }
            showNotification('Atualizando dashboard...', 'info');
        }

        // ⌨️ Keyboard Shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey) {
                switch (e.key) {
                    case '1':
                        e.preventDefault();
                        switchProfile('admin');
                        break;
                    case '2':
                        e.preventDefault();
                        switchProfile('affiliate');
                        break;
                    case '3':
                        e.preventDefault();
                        switchProfile('user');
                        break;
                    case 'r':
                        e.preventDefault();
                        requestUpdate();
                        break;
                }
            }
        });

        // 🔥 Handle Page Visibility
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // Página ficou visível, reconectar se necessário
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    initializeWebSocket();
                }
                requestUpdate();
            }
        });
    </script>
</body>
</html>
